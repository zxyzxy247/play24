<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>点击版24点游戏</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:微软雅黑,sans-serif}
body{background:linear-gradient(135deg,#2c3e50,#4ca1af);min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px}
.game{background:#fff;border-radius:20px;padding:30px;width:100%;max-width:420px;text-align:center;box-shadow:0 10px 30px rgba(0,0,0,0.2)}
h1{margin-bottom:10px}
.tip{color:#666;margin-bottom:20px;font-size:14px}
.numbers{display:flex;gap:12px;justify-content:center;margin:20px 0}
.num{width:60px;height:60px;background:#27ae60;color:#fff;font-size:24px;font-weight:bold;border-radius:12px;display:grid;place-items:center;cursor:pointer;border:none}
.ops{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:20px 0}
.op{height:50px;background:#3498db;color:#fff;font-size:20px;border:none;border-radius:10px;cursor:pointer}
.ctrl{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.ctrl button{height:46px;border-radius:10px;border:none;font-size:16px;color:#fff;cursor:pointer}
.bg-green{background:#27ae60}
.bg-orange{background:#f39c12}
.bg-gray{background:#95a5a6}
.formula{background:#f8f9fa;padding:14px;border-radius:10px;font-size:20px;min-height:52px;display:grid;place-items:center;margin-bottom:15px}
.msg{font-size:17px;font-weight:bold;margin-top:10px;height:24px}
.success{color:#27ae60}
.error{color:#e74c3c}
</style>
</head>
<body>
<div class="game">
  <h1>🎮 点击算24点</h1>
  <p class="tip">点击数字和符号，拼出算式=24<br>每个数字必须用1次</p>

  <div class="numbers" id="numBtns"></div>
  <div class="formula" id="formula"></div>

  <div class="ops">
    <button class="op" onclick="addOp('+')">+</button>
    <button class="op" onclick="addOp('-')">-</button>
    <button class="op" onclick="addOp('×')">×</button>
    <button class="op" onclick="addOp('÷')">÷</button>
    <button class="op" onclick="addOp('(')">(</button>
    <button class="op" onclick="addOp(')')">)</button>
    <button class="op" onclick="addOp(' ')">⌫</button>
    <button class="op" onclick="clearAll()">清空</button>
  </div>

  <div class="ctrl">
    <button class="bg-green" onclick="check()">计算结果</button>
    <button class="bg-orange" onclick="hint()">看答案</button>
    <button class="bg-gray" onclick="newGame()">下一题</button>
  </div>

  <div class="msg" id="msg"></div>
</div>

<script>
let nums = [];
let used = [];
let expr = "";
let ans = "";

const questions = [
  [[1,3,4,6],"6/(1-3/4)=24"],
  [[5,5,5,1],"(5-1/5)*5=24"],
  [[2,2,11,11],"(2+2/11)*11=24"],
  [[1,2,3,4],"1×2×3×4=24"],
  [[3,3,8,8],"8/(3-8/3)=24"],
  [[2,3,4,5],"2×(3+4+5)=24"],
  [[4,4,10,10],"(10×10-4)/4=24"],
  [[2,4,6,8],"2×6+4+8=24"]
];

function newGame(){
  const q = questions[Math.random()*questions.length|0];
  nums = q[0];
  used = [0,0,0,0];
  expr = "";
  ans = q[1];
  render();
  document.getElementById("msg").innerText = "";
}

function render(){
  const box = document.getElementById("numBtns");
  box.innerHTML = "";
  nums.forEach((n,i)=>{
    const b = document.createElement("button");
    b.className = "num";
    b.innerText = n;
    b.disabled = used[i];
    b.onclick = ()=>{used[i]=1;expr+=n;show()};
    box.appendChild(b);
  });
  show();
}

function show(){
  document.getElementById("formula").innerText = expr || "请点击输入";
}

function addOp(s){
  if(s==="⌫"){
    const last = expr.slice(-1);
    if(!isNaN(last)){
      const idx = nums.indexOf(+last);
      if(idx!==-1)used[idx]=0;
    }
    expr = expr.slice(0,-1);
  }else{
    expr += s;
  }
  show();
}

function clearAll(){
  expr = "";
  used = [0,0,0,0];
  show();
}

function check(){
  let f = expr.replace(/×/g,"*").replace(/÷/g,"/");
  const m = document.getElementById("msg");

  try{
    const r = Function("return "+f)();
    if(Math.abs(r-24)<0.001){
      m.className = "msg success";
      m.innerText = "✅ 正确！太厉害了！";
    }else{
      m.className = "msg error";
      m.innerText = "❌ 结果："+r.toFixed(2);
    }
  }catch(e){
    m.className = "msg error";
    m.innerText = "❌ 算式格式错误";
  }
}

function hint(){
  document.getElementById("msg").innerText = "💡 参考："+ans;
}

newGame();
</script>
</body>
</html>
